<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 240px;
      padding: 16px;
      margin: 0;
      background: #fff;
      color: #1d2226;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 16px;
      color: #0A66C2;
    }
    .filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e8e7e6;
    }
    .filter-row:last-of-type {
      border-bottom: none;
    }
    .filter-label {
      font-size: 13px;
    }
    .filter-count {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #0A66C2; }
    input:checked + .slider::before { transform: translateX(16px); }

    .reset {
      margin-top: 14px;
      width: 100%;
      padding: 7px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #f3f2f1;
      color: #555;
      cursor: pointer;
    }
    .reset:hover { background: #e8e7e6; }
  </style>
</head>
<body>
  <h1>LinkedIn Feed Cleaner</h1>

  <div class="filter-row">
    <div>
      <div class="filter-label">Promoted posts</div>
      <div class="filter-count" id="count-promoted">0 blocked</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-promoted">
      <span class="slider"></span>
    </label>
  </div>

  <div class="filter-row">
    <div>
      <div class="filter-label">Suggested posts</div>
      <div class="filter-count" id="count-suggested">0 blocked</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-suggested">
      <span class="slider"></span>
    </label>
  </div>

  <div class="filter-row">
    <div>
      <div class="filter-label">Recommended for you</div>
      <div class="filter-count" id="count-recommended">0 blocked</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-recommended">
      <span class="slider"></span>
    </label>
  </div>

  <div class="filter-row">
    <div>
      <div class="filter-label">Connection activity posts</div>
      <div class="filter-count" id="count-activity">0 blocked</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-activity">
      <span class="slider"></span>
    </label>
  </div>

  <button class="reset" id="reset">Reset counters</button>
  <script src="popup.js"></script>
</body>
</html>
